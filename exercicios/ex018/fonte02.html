<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes 02</title>
    <style>
        @font-face {
            font-family: 'love';
            src: url('love.txt') format('opentype'), url('love2.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;

            /* tipos de formatos
           -opentype (otf)
           -truetype (ttf)
           -embedded-opentype
           -truetype-aat (apple advancod)
           -svg
            */
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        h1 {
            font-family: 'love', 'Times New Roman', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Olá Mundo</h1>
    <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Et aliquam quidem repellendus ea voluptates consequatur a voluptatibus non fuga totam? Vel aliquam magni est tempore temporibus non totam delectus ullam!</p>
    
</body>
</html>
