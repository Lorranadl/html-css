<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1 { /* elemento box-level*/
            height: 300px;
            width: 300px;
            border-width: 20px;
            border-style: solid;
            border-color: cadetblue;

          /* simplificação de 'border'
        border: 10px, solid, cadetblue
          */
            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
          /* simplificação de padding
          padding:10px;
          */
            margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 40px;
            margin-left: 20px;
           /* simplificação de margin
           margin: 20px, 20px, 40px, 20px; ou por ultimo 'auto' para centralizar
           */
            outline-width: 5px;
            outline-style: dashed;
            outline-color: salmon;

            /* simplificação de outline
            outline: 5px, dashed, salmon;
            */

            /*margin:auto; para centralizar*/
        }
        a { /* Elemento do tipo inline-level*/
            border-width: 11px;
            border-style: solid;
            border-color: red;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level mas os <a href="#">links são exemplos de caixa inline-level</a> Vamos ver como tudo funciona</p>
</body>
</html>
